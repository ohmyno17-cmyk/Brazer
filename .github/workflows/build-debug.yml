name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Verify submodules
        run: |
          echo "=== Checking submodules ==="
          git submodule status
          echo "=== Core directory contents ==="
          ls -la core/ || echo "core directory not found"
          ls -la core/common/ 2>/dev/null || echo "core/common not found"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Configure Gradle
        run: |
          printf "\norg.gradle.daemon=false\n" >> ./gradle.properties
          printf "org.gradle.parallel=true\n" >> ./gradle.properties
          printf "org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8\n" >> ./gradle.properties
          printf "isFullBuild=false\n" >> ./gradle.properties
          rm -f gradle/gradle-daemon-jvm.properties || true

      - name: Build Debug APK (FOSS)
        run: ./gradlew androidApp:assembleDebug --no-daemon --stacktrace --info

      - name: Rename APK
        run: |
          mv androidApp/build/outputs/apk/debug/*.apk brazzer-debug.apk || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: brazzer-debug-apk
          path: |
            androidApp/build/outputs/apk/debug/*.apk
            brazzer-debug.apk

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: brazzer Debug Build ${{ github.run_number }}
          files: |
            androidApp/build/outputs/apk/debug/*.apk
            brazzer-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
