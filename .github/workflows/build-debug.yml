name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build Debug APK (FOSS)
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=false" >> ./gradle.properties
          ./gradlew androidApp:assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mv androidApp/build/outputs/apk/debug/*.apk brazzer-debug.apk || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: brazzer-debug-apk
          path: |
            androidApp/build/outputs/apk/debug/*.apk
            brazzer-debug.apk

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: brazzer Debug Build ${{ github.run_number }}
          files: |
            androidApp/build/outputs/apk/debug/*.apk
            brazzer-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
