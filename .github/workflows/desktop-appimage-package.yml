name: Build desktop AppImage package

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write

jobs:
  build-desktop-appimage:
    name: Build desktop AppImage package
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install libfuse2
        run: sudo apt install -y libfuse2

      - name: Configure Gradle
        run: |
          printf "\norg.gradle.daemon=false\n" >> ./gradle.properties
          printf "org.gradle.parallel=true\n" >> ./gradle.properties
          printf "org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8\n" >> ./gradle.properties
          printf "isFullBuild=true\n" >> ./gradle.properties
          rm -f gradle/gradle-daemon-jvm.properties || true

      - name: Update Sentry Secrets
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_JVM }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          echo 'SENTRY_DSN=${{ secrets.SENTRY_DSN_JVM }}' > ./local.properties
          echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> ./local.properties

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions --no-daemon --stacktrace

      - name: Set up VLC
        run: ./gradlew vlcSetup --no-daemon --stacktrace

      - name: Build desktop AppImage package
        run: ./gradlew composeApp:packageReleaseAppImage --no-daemon --stacktrace

      - name: Upload AppImage package
        uses: actions/upload-artifact@v4
        with:
          name: desktop-appimage-package
          path: composeApp/build/appimage/main-release/SimpMusic-x86_64.AppImage
